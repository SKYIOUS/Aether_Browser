<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aether Browser - Mobile iOS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: oklch(12% 0.01 250);
            --surface: oklch(18% 0.01 250);
            --fg: oklch(98% 0.005 250);
            --muted: oklch(60% 0.01 250);
            --border: oklch(25% 0.01 250);
            --accent: oklch(75% 0.12 255);
        }
        body {
            background-color: #000;
            color: var(--fg);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .iphone-frame {
            width: 390px;
            height: 844px;
            background-color: var(--bg);
            border-radius: 54px;
            border: 12px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }
        .dynamic-island {
            width: 120px;
            height: 36px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        .bottom-nav {
            background: rgba(10, 11, 12, 0.8);
            backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="iphone-frame flex flex-col">
        <div class="dynamic-island"></div>
        
        <!-- Status Bar Area -->
        <div class="h-12 flex justify-between items-center px-8 pt-2">
            <span class="text-xs font-medium">9:41</span>
            <div class="flex gap-1.5 items-center">
                <span class="material-symbols-outlined text-xs">signal_cellular_4_bar</span>
                <span class="material-symbols-outlined text-xs">wifi</span>
                <span class="material-symbols-outlined text-xs">battery_full</span>
            </div>
        </div>

        <!-- Header -->
        <header class="px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded bg-accent flex items-center justify-center text-bg">
                    <span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">blur_on</span>
                </div>
                <span class="font-semibold text-sm tracking-tighter uppercase">Aether</span>
            </div>
            <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                <span class="material-symbols-outlined text-zinc-400 text-sm">person</span>
            </div>
        </header>

        <!-- Main Search View -->
        <main class="flex-1 flex flex-col items-center justify-center px-6 -mt-12">
            <h1 class="text-5xl font-thin text-accent mb-8 opacity-60">21:45</h1>
            
            <div class="w-full relative group mb-12">
                <div class="glass-pill w-full h-14 rounded-full flex items-center px-6 shadow-2xl">
                    <span class="material-symbols-outlined text-zinc-500 text-[20px] mr-3">search</span>
                    <input class="bg-transparent border-none focus:ring-0 text-sm text-zinc-200 w-full placeholder:text-zinc-600 outline-none" placeholder="Where to next?" type="text"/>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 w-full">
                <div class="glass-pill p-5 rounded-3xl flex flex-col gap-3">
                    <div class="w-10 h-10 rounded-xl bg-accent/10 flex items-center justify-center text-accent">
                        <span class="material-symbols-outlined">auto_awesome</span>
                    </div>
                    <span class="text-[10px] uppercase tracking-widest font-bold text-zinc-400">Mission</span>
                </div>
                <div class="glass-pill p-5 rounded-3xl flex flex-col gap-3 border-accent/20 bg-accent/5">
                    <div class="w-10 h-10 rounded-xl bg-accent/20 flex items-center justify-center text-accent">
                        <span class="material-symbols-outlined">biotech</span>
                    </div>
                    <span class="text-[10px] uppercase tracking-widest font-bold text-accent">Research</span>
                </div>
            </div>
        </main>

        <!-- Tab Bar -->
        <nav class="bottom-nav h-20 px-8 pb-4 flex justify-between items-center">
            <button class="flex flex-col items-center gap-1 text-accent transition-all">
                <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">space_dashboard</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-zinc-600 hover:text-zinc-200 transition-all">
                <span class="material-symbols-outlined text-[24px]">history</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-zinc-600 hover:text-zinc-200 transition-all">
                <span class="material-symbols-outlined text-[24px]">bookmarks</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-zinc-600 hover:text-zinc-200 transition-all">
                <span class="material-symbols-outlined text-[24px]">settings</span>
            </button>
        </nav>

        <!-- Home Indicator -->
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full"></div>
    </div>

</body>
</html>
